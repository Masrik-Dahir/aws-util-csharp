name: NuGet Vulnerability Audit

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 9 AM UTC

jobs:
  audit:
    name: Audit NuGet Packages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore with audit
        run: dotnet restore

      - name: List vulnerable packages
        run: dotnet list package --vulnerable --include-transitive 2>&1 | tee vulnerability-report.txt

      - name: Check for critical vulnerabilities
        run: |
          if grep -qi "critical" vulnerability-report.txt; then
            echo "::error::Critical vulnerabilities found in dependencies!"
            exit 1
          fi

      - name: List outdated packages
        run: dotnet list package --outdated 2>&1 | tee outdated-report.txt

      - name: Upload audit reports
        uses: actions/upload-artifact@v4
        with:
          name: audit-reports
          path: |
            vulnerability-report.txt
            outdated-report.txt
          retention-days: 14
