name: Welcome

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    name: Welcome New Contributors
    runs-on: ubuntu-latest

    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Thanks for opening your first issue! We'll take a look soon.

            In the meantime, please make sure you've included:
            - A clear description of the issue
            - Steps to reproduce (if it's a bug)
            - The AWS service(s) involved
            - Your .NET and AwsUtil version
          pr-message: |
            Thanks for your first pull request! We appreciate your contribution to AwsUtil.

            Please ensure:
            - Tests pass (`dotnet test`)
            - Code follows the existing style (`dotnet format`)
            - CHANGELOG.md is updated
            - Any new services follow the existing patterns in `src/AwsUtil/Services/`
