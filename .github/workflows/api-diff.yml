name: API Diff

on:
  pull_request:
    branches: [main, master]
    paths:
      - "src/**/*.cs"

jobs:
  api-diff:
    name: Detect Public API Changes
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build PR branch
        run: dotnet build src/AwsUtil/AwsUtil.csproj --configuration Release --output ./pr-build

      - name: Build base branch
        run: |
          git stash
          git checkout ${{ github.event.pull_request.base.sha }}
          dotnet build src/AwsUtil/AwsUtil.csproj --configuration Release --output ./base-build || echo "Base build failed, skipping diff"
          git checkout -

      - name: Compare assemblies
        run: |
          if [ -f "./base-build/AwsUtil.dll" ] && [ -f "./pr-build/AwsUtil.dll" ]; then
            echo "## API Diff" > api-diff.md
            echo "" >> api-diff.md
            echo "Comparing base vs PR assemblies:" >> api-diff.md
            echo "- Base: $(stat --format=%s ./base-build/AwsUtil.dll) bytes" >> api-diff.md
            echo "- PR: $(stat --format=%s ./pr-build/AwsUtil.dll) bytes" >> api-diff.md
          else
            echo "Skipping comparison - assemblies not available" > api-diff.md
          fi

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: api-diff
          path: api-diff.md
