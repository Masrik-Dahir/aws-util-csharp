<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" viewBox="0 0 800 120">
  <defs>
    <linearGradient id="cosmicGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141E30"/>
      <stop offset="100%" style="stop-color:#243B55"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="120" rx="12" ry="12" fill="url(#cosmicGrad)"/>

  <!-- Twinkling stars -->
  <circle cx="45" cy="25" r="1.2" fill="#E040FB" opacity="0.8">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="130" cy="95" r="1" fill="#7C4DFF" opacity="0.6">
    <animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="210" cy="18" r="1.4" fill="#E040FB" opacity="0.7">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="340" cy="105" r="0.9" fill="#7C4DFF" opacity="0.5">
    <animate attributeName="opacity" values="0.1;0.8;0.1" dur="2.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="480" cy="15" r="1.1" fill="#E040FB" opacity="0.9">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="560" cy="100" r="1.3" fill="#7C4DFF" opacity="0.6">
    <animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="650" cy="22" r="1" fill="#E040FB" opacity="0.7">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="720" cy="88" r="1.5" fill="#7C4DFF" opacity="0.8">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="90" cy="60" r="0.8" fill="#E040FB" opacity="0.4">
    <animate attributeName="opacity" values="0.1;0.7;0.1" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="760" cy="40" r="1.1" fill="#7C4DFF" opacity="0.5">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="380" cy="35" r="0.7" fill="#E040FB" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="55" r="1.2" fill="#7C4DFF" opacity="0.7">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.9s" repeatCount="indefinite"/>
  </circle>

  <!-- Author name -->
  <text x="400" y="52" text-anchor="middle" fill="#FFFFFF" font-family="'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="700">Masrik Dahir</text>

  <!-- Website -->
  <text x="400" y="82" text-anchor="middle" fill="#E040FB" font-family="'Segoe UI', system-ui, sans-serif" font-size="14">masrikdahir.com</text>
</svg>
