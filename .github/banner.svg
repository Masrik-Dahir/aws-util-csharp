<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" viewBox="0 0 800 120">
  <defs>
    <linearGradient id="oceanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1B2A"/>
      <stop offset="50%" style="stop-color:#1B263B"/>
      <stop offset="100%" style="stop-color:#415A77"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="120" rx="12" ry="12" fill="url(#oceanGrad)"/>

  <!-- Wave effect on bottom border -->
  <path d="M0,110 Q100,95 200,110 T400,110 T600,110 T800,110 L800,120 L0,120 Z" fill="none" stroke="#00E5FF" stroke-width="1.5" opacity="0.5">
    <animate attributeName="d" values="M0,110 Q100,95 200,110 T400,110 T600,110 T800,110 L800,120 L0,120 Z;M0,110 Q100,115 200,105 T400,112 T600,108 T800,110 L800,120 L0,120 Z;M0,110 Q100,95 200,110 T400,110 T600,110 T800,110 L800,120 L0,120 Z" dur="4s" repeatCount="indefinite"/>
  </path>
  <path d="M0,114 Q100,100 200,114 T400,114 T600,114 T800,114 L800,120 L0,120 Z" fill="none" stroke="#76FF03" stroke-width="1" opacity="0.3">
    <animate attributeName="d" values="M0,114 Q100,100 200,114 T400,114 T600,114 T800,114 L800,120 L0,120 Z;M0,114 Q100,118 200,108 T400,116 T600,112 T800,114 L800,120 L0,120 Z;M0,114 Q100,100 200,114 T400,114 T600,114 T800,114 L800,120 L0,120 Z" dur="3.5s" repeatCount="indefinite"/>
  </path>

  <!-- Floating diamond decorations -->
  <polygon points="55,85 60,78 65,85 60,92" fill="#00E5FF" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-8;0,0" dur="4s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="155,20 158,15 161,20 158,25" fill="#76FF03" opacity="0.3">
    <animate attributeName="opacity" values="0.1;0.5;0.1" dur="2.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-6;0,0" dur="3.2s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="320,92 324,86 328,92 324,98" fill="#00E5FF" opacity="0.35">
    <animate attributeName="opacity" values="0.15;0.55;0.15" dur="3.8s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-10;0,0" dur="4.5s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="510,18 513,13 516,18 513,23" fill="#76FF03" opacity="0.3">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.8s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-7;0,0" dur="3.6s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="680,88 684,82 688,88 684,94" fill="#00E5FF" opacity="0.4">
    <animate attributeName="opacity" values="0.1;0.5;0.1" dur="3.3s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-9;0,0" dur="4.2s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="750,30 753,25 756,30 753,35" fill="#76FF03" opacity="0.25">
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="2.2s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="3s" repeatCount="indefinite"/>
  </polygon>

  <!-- Author name -->
  <text x="400" y="52" text-anchor="middle" fill="#FFFFFF" font-family="'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="700">Masrik Dahir</text>

  <!-- Website -->
  <text x="400" y="82" text-anchor="middle" fill="#00E5FF" font-family="'Segoe UI', system-ui, sans-serif" font-size="14">masrikdahir.com</text>
</svg>
